<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marmoraria Sem Parar</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:#fff;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
}

/* CARRINHO ICON */
.cart-icon{
position:fixed;
top:15px;
left:15px;
background:#fff;
color:#000;
padding:10px;
border-radius:50%;
cursor:pointer;
z-index:1000;
transition:.3s;
}
.cart-icon:hover{
transform:scale(1.1);
}

/* MENU CATEGORIAS */
.categorias{
display:flex;
overflow-x:auto;
padding:10px;
gap:10px;
}

.cat{
background:#111;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
transition:.3s;
}

.cat:hover{
background:#fff;
color:#000;
transform:scale(1.1);
}

/* GRID MOBILE */
.grid{
display:grid;
grid-template-columns:1fr;
gap:15px;
padding:15px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
transition:.3s;
}
.card:hover{
transform:translateY(-5px);
}

/* BOTÃO */
.btn{
background:#fff;
color:#000;
padding:10px;
border:none;
cursor:pointer;
margin-top:10px;
transition:.3s;
border-radius:8px;
}

.btn:hover{
transform:scale(1.05);
}

/* CARRINHO LATERAL */
.cart{
position:fixed;
top:0;
left:-100%;
width:80%;
height:100%;
background:#111;
transition:.4s;
padding:20px;
z-index:999;
}

.cart.active{
left:0;
}
</style>
</head>

<body>

<!-- ICON CARRINHO -->
<div class="cart-icon" onclick="toggleCart()">🛒</div>

<header>
<h2>Marmoraria Sem Parar</h2>
</header>

<!-- CATEGORIAS -->
<div class="categorias">
<div class="cat" onclick="filtrar('todos')">Todos</div>
<div class="cat" onclick="filtrar('bancada')">Bancadas</div>
<div class="cat" onclick="filtrar('pia')">Pias</div>
<div class="cat" onclick="filtrar('escada')">Escadas</div>
</div>

<!-- PRODUTOS -->
<div class="grid" id="produtos"></div>

<!-- CARRINHO -->
<div class="cart" id="cart">
<h3>Carrinho</h3>
<div id="itens"></div>
<h3>Total: R$ <span id="total">0</span></h3>
<button class="btn" onclick="checkout()">Finalizar</button>
</div>

<script>
let produtos = [
{nome:"Bancada Premium", preco:800, cat:"bancada"},
{nome:"Bancada Simples", preco:500, cat:"bancada"},
{nome:"Pia Esculpida", preco:400, cat:"pia"},
{nome:"Escada Mármore", preco:1500, cat:"escada"}
];

let carrinho = [];
let total = 0;

function render(lista){
let div = document.getElementById("produtos");
div.innerHTML="";

lista.forEach(p=>{
div.innerHTML += `
<div class="card">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<button class="btn" onclick='add(${JSON.stringify(p)})'>Adicionar</button>
</div>
`;
});
}

function filtrar(cat){
if(cat === "todos"){
render(produtos);
}else{
render(produtos.filter(p=>p.cat === cat));
}
}

function add(p){
carrinho.push(p);
total += p.preco;

document.getElementById("itens").innerHTML += `
<p>${p.nome} - R$ ${p.preco}</p>
`;

document.getElementById("total").innerText = total;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function checkout(){
alert("Pedido enviado!");
}

render(produtos);
</script>

</body>
</html>
