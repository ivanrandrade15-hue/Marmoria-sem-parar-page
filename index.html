<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marmoraria Sem Parar</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:#fff;
}

/* FUNDO */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('https://i.imgur.com/9QZ7Z7T.jpg') center/cover;
opacity:0.07;
z-index:-1;
animation:bg 20s infinite alternate;
}
@keyframes bg{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

/* HEADER */
header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{font-size:18px;}

/* BOTÕES */
.btn{
background:#fff;
color:#000;
padding:10px 20px;
border:none;
cursor:pointer;
border-radius:8px;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* ANIMAÇÕES */
.pulse{
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.glow{
box-shadow:0 0 10px #fff;
}

/* HERO */
.hero{
text-align:center;
padding:40px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
transition:.3s;
}
.card:hover{
transform:translateY(-5px);
}

/* CARRINHO */
.cart{
position:fixed;
right:0;
top:0;
width:250px;
height:100%;
background:#111;
padding:15px;
overflow:auto;
}

/* INPUT */
input, select{
width:100%;
padding:10px;
margin:10px 0;
background:#222;
border:none;
color:#fff;
}

.review{
background:#111;
padding:10px;
margin:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>Marmoraria Sem Parar</h1>
<button class="btn pulse" onclick="abrirWhats()">WhatsApp</button>
</header>

<section class="hero">
<h2>Loja Oficial</h2>
<p>Mármores e Granitos Premium</p>
</section>

<!-- ORÇAMENTO -->
<section class="hero">
<h3>Calcular Orçamento</h3>

<select id="material">
<option value="300">Granito</option>
<option value="500">Mármore</option>
<option value="900">Quartzo</option>
</select>

<input type="number" id="metros" placeholder="m²">

<button class="btn glow" onclick="calcular()">Calcular</button>

<h3 id="resultado"></h3>
</section>

<!-- PRODUTOS -->
<section>
<h2 style="text-align:center;">Produtos</h2>
<div class="grid" id="produtos"></div>
</section>

<!-- AVALIAÇÕES -->
<section>
<h2 style="text-align:center;">Avaliações</h2>
<div id="reviews"></div>
</section>

<!-- CARRINHO -->
<div class="cart">
<h3>Carrinho</h3>
<div id="itens"></div>
<h3>Total: R$ <span id="total">0</span></h3>
<button class="btn glow" onclick="checkout()">Finalizar</button>
</div>

<script>
/* WHATS */
function abrirWhats(){
window.open("https://wa.me/5511999999999");
}

/* ORÇAMENTO */
function calcular(){
let m = document.getElementById("material").value;
let mt = document.getElementById("metros").value;

if(!mt) return alert("Digite m²");

let total = m * mt;

document.getElementById("resultado").innerText =
"R$ " + total.toFixed(2);
}

/* PRODUTOS */
let produtos = [
{nome:"Bancada Premium", preco:800},
{nome:"Pia Esculpida", preco:500},
{nome:"Escada Mármore", preco:1500},
{nome:"Revestimento", preco:300}
];

let carrinho = [];
let total = 0;

function render(){
let pDiv = document.getElementById("produtos");
pDiv.innerHTML="";

produtos.forEach(p=>{
pDiv.innerHTML += `
<div class="card">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<button class="btn" onclick='add(${JSON.stringify(p)})'>Adicionar</button>
</div>
`;
});
}

function add(prod){
carrinho.push(prod);
total += prod.preco;

document.getElementById("itens").innerHTML += `
<p>${prod.nome} - R$ ${prod.preco}</p>
`;

document.getElementById("total").innerText = total;
}

/* CHECKOUT SIMULADO */
function checkout(){
alert("Pedido enviado! Vamos te chamar no WhatsApp.");

abrirWhats();
}

/* AVALIAÇÕES (SIMULADO) */
let reviews = [
{r:5,t:"Perfeito acabamento"},
{r:5,t:"Entrega rápida"},
{r:4,t:"Ótimo custo benefício"}
];

let rDiv = document.getElementById("reviews");

reviews.forEach(r=>{
rDiv.innerHTML += `
<div class="review">
⭐ ${r.r} <br>${r.t}
</div>
`;
});

/* INIT */
render();
</script>

</body>
</html>
