<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marmoraria Sem Parar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b0b;--card:#111}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden}/* ANIMATED BACKGROUND */ header{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden} header::before{ content:""; position:absolute; inset:0; background:url('https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=1600&auto=format&fit=crop') center/cover; animation: moveBg 20s infinite alternate ease-in-out; filter:brightness(0.3); }

@keyframes moveBg{ 0%{transform:scale(1) translate(0,0)} 100%{transform:scale(1.1) translate(-20px,-20px)} }

.hero{position:relative;z-index:2} .hero img{width:120px;margin-bottom:20px;border-radius:50%;animation: float 4s ease-in-out infinite}

@keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

.hero h1{font-family:'Playfair Display',serif;font-size:3rem;margin:0} .hero p{color:#ddd}

.btn{background:#fff;color:#000;padding:14px 28px;border-radius:30px;text-decoration:none;display:inline-block;margin-top:15px;transition:.3s} .btn:hover{transform:scale(1.05)}

section{padding:70px 20px} .container{max-width:1100px;margin:auto}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px} .card{background:#111;padding:20px;border-radius:15px;transition:.4s} .card:hover{transform:translateY(-10px) scale(1.03)}

.card img{width:100%;border-radius:10px}

.fade{opacity:0;transform:translateY(40px);transition:1s} .fade.show{opacity:1;transform:translateY(0)}

footer{text-align:center;padding:30px;background:#000} </style>

</head>
<body><header>
  <div class="hero">
    <img src="logo.png" alt="logo">
    <h1>Marmoraria Sem Parar</h1>
    <p>Luxo em mármore e granito sob medida</p>
    <a href="#orcamento" class="btn">Solicitar Orçamento</a>
  </div>
</header><section class="fade">
<div class="container">
<h2>Projetos</h2>
<div class="grid">
<div class="card"><img src="https://images.unsplash.com/photo-1618220179428-22790b461013"/><p>Nero Marquina</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1615874959474-d609969a20ed"/><p>Carrara</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1600573472550-8090b5e0745e"/><p>Granito São Gabriel</p></div>
</div>
</div>
</section><section class="fade">
<div class="container">
<h2>Escolha seu Mármore</h2>
<div class="grid" id="marbles">
<div class="card marble" data-name="Nero Marquina"><img src="https://images.unsplash.com/photo-1618220179428-22790b461013"/><p>Nero Marquina</p></div>
<div class="card marble" data-name="Carrara"><img src="https://images.unsplash.com/photo-1615874959474-d609969a20ed"/><p>Carrara</p></div>
<div class="card marble" data-name="São Gabriel"><img src="https://images.unsplash.com/photo-1600573472550-8090b5e0745e"/><p>Granito São Gabriel</p></div>
</div>
<p id="selected" style="margin-top:20px;text-align:center;color:#aaa">Nenhum mármore selecionado</p>
</div>
</section><section id="orcamento" class="fade">
<div class="container">
<h2>Orçamento</h2>
<form onsubmit="sendWhats(event)">
<input type="number" id="largura" placeholder="Largura (m)" required>
<input type="number" id="comprimento" placeholder="Comprimento (m)" required>
<input type="text" id="nome" placeholder="Seu nome" required>
<input type="tel" id="tel" placeholder="WhatsApp" required>
<textarea id="msg" placeholder="Seu projeto"></textarea>
<p id="preco" style="color:#0f0;margin-top:10px"></p>
<button class="btn">Enviar</button>
</form>
</div>
</section><footer>
<p>São Paulo - SP</p>
</footer><script>
const faders=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
 faders.forEach(el=>{
  if(el.getBoundingClientRect().top<window.innerHeight-100){el.classList.add('show')}
 })
});

let selectedMarble = "";

// seleção de mármore
const marbles = document.querySelectorAll('.marble');
const selectedText = document.getElementById('selected');

marbles.forEach(card => {
 card.addEventListener('click', () => {
  marbles.forEach(c => c.style.border = "none");
  card.style.border = "2px solid white";
  selectedMarble = card.dataset.name;
  selectedText.innerText = "Selecionado: " + selectedMarble;
 });
});

// cálculo automático
function calcular(){
 const largura = parseFloat(document.getElementById('largura').value) || 0;
 const comprimento = parseFloat(document.getElementById('comprimento').value) || 0;
 const area = largura * comprimento;
 let valorM2 = 500;
 if(selectedMarble === "Nero Marquina") valorM2 = 900;
 if(selectedMarble === "Carrara") valorM2 = 700;
 if(selectedMarble === "São Gabriel") valorM2 = 500;
 const total = area * valorM2;
 document.getElementById('preco').innerText = "Estimativa: R$ " + total.toFixed(2);
 return total;
}

['largura','comprimento'].forEach(id=>{
 document.getElementById(id).addEventListener('input',calcular)
});

function sendWhats(e){

 e.preventDefault();
 const nome=document.getElementById('nome').value;
 const tel=document.getElementById('tel').value;
 const msg=document.getElementById('msg').value;
 const total = calcular();
 const texto=`Olá, meu nome é ${nome}%0AWhatsApp: ${tel}%0AMármore: ${selectedMarble}%0AProjeto: ${msg}`;
 window.open(`https://wa.me/5511999999999?text=${texto}`,'_blank');
}
</script></body>
</html>
