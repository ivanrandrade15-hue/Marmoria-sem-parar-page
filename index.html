<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marmoraria Sem Parar</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* FUNDO ANIMADO */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(120deg,#111,#1a1a1a,#000);
background-size:300% 300%;
animation:fundo 12s infinite alternate;
z-index:-2;
}

@keyframes fundo{
0%{background-position:0%}
100%{background-position:100%}
}

/* PARTÍCULAS */
body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('https://i.imgur.com/8Km9tLL.png');
opacity:0.05;
z-index:-1;
animation:move 20s linear infinite;
}

@keyframes move{
from{transform:translateY(0)}
to{transform:translateY(-200px)}
}

/* HEADER */
header{
text-align:center;
padding:20px;
font-size:18px;
letter-spacing:2px;
}

/* CARRINHO ICON */
.cart-icon{
position:fixed;
top:15px;
left:15px;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
cursor:pointer;

/* EFEITO METÁLICO */
background:linear-gradient(145deg,#dcdcdc,#888);
box-shadow:inset 2px 2px 5px #fff, inset -2px -2px 5px #555;
transition:.3s;
}

.cart-icon:hover{
transform:scale(1.1) rotate(5deg);
}

/* CATEGORIAS */
.categorias{
display:flex;
overflow-x:auto;
padding:10px;
gap:10px;
}

.cat{
padding:10px 15px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
background:linear-gradient(145deg,#222,#000);
transition:.3s;
}

.cat:hover{
background:linear-gradient(145deg,#fff,#aaa);
color:#000;
transform:scale(1.1);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr;
gap:15px;
padding:15px;
}

/* CARD */
.card{
padding:20px;
border-radius:12px;
text-align:center;

/* METAL */
background:linear-gradient(145deg,#1a1a1a,#000);
box-shadow:5px 5px 15px #000, -2px -2px 10px #333;
transition:.3s;
}

.card:hover{
transform:translateY(-5px) scale(1.02);
}

/* BOTÃO */
.btn{
margin-top:10px;
padding:10px;
border:none;
cursor:pointer;
border-radius:8px;
font-weight:bold;

/* METAL BRILHO */
background:linear-gradient(145deg,#e6e6e6,#999);
color:#000;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
background:linear-gradient(145deg,#fff,#bbb);
}

/* CARRINHO */
.cart{
position:fixed;
top:0;
left:-100%;
width:80%;
height:100%;
background:#111;
padding:20px;
transition:.4s;
z-index:999;
}

.cart.active{
left:0;
}

.item{
padding:10px 0;
border-bottom:1px solid #333;
}

.final{
margin-top:20px;
}
</style>
</head>

<body>

<!-- ICON -->
<div class="cart-icon" onclick="toggleCart()">🛒</div>

<header>
MARMORARIA SEM PARAR
</header>

<!-- CATEGORIAS -->
<div class="categorias">
<div class="cat" onclick="filtrar('todos')">Todos</div>
<div class="cat" onclick="filtrar('bancada')">Bancadas</div>
<div class="cat" onclick="filtrar('pia')">Pias</div>
<div class="cat" onclick="filtrar('escada')">Escadas</div>
</div>

<!-- PRODUTOS -->
<div class="grid" id="produtos"></div>

<!-- CARRINHO -->
<div class="cart" id="cart">
<h3>Orçamento</h3>
<div id="itens"></div>

<button class="btn final" onclick="enviarWhats()">
Solicitar Orçamento
</button>
</div>

<script>
let produtos = [
{nome:"Bancada Premium", cat:"bancada"},
{nome:"Bancada Cozinha", cat:"bancada"},
{nome:"Pia Esculpida", cat:"pia"},
{nome:"Pia Banheiro", cat:"pia"},
{nome:"Escada Mármore", cat:"escada"}
];

let carrinho = [];

function render(lista){
let div = document.getElementById("produtos");
div.innerHTML="";

lista.forEach(p=>{
div.innerHTML += `
<div class="card">
<h3>${p.nome}</h3>
<button class="btn" onclick='add(${JSON.stringify(p)})'>
Selecionar
</button>
</div>
`;
});
}

function filtrar(cat){
if(cat==="todos"){
render(produtos);
}else{
render(produtos.filter(p=>p.cat===cat));
}
}

function add(p){
carrinho.push(p);

document.getElementById("itens").innerHTML += `
<div class="item">${p.nome}</div>
`;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* WHATSAPP */
function enviarWhats(){
let texto = "Olá, quero orçamento para: \n";

carrinho.forEach(p=>{
texto += "- " + p.nome + "\n";
});

window.open("https://wa.me/5511999999999?text=" + encodeURIComponent(texto));
}

render(produtos);
</script>

</body>
</html>
